name: edugalaxy
description: Aplicativo de jogos educacionais para alunos e professores.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  google_sign_in: ^6.2.2
  go_router: ^14.0.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.6
  cloud_firestore: 6.6.0
  shared_preferences: ^2.5.5
  pdf: ^3.11.1
  printing: ^5.13.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icone.jpeg" # Caminho para o seu arquivo icone.png
  min_sdk_android: 21